<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>17</title>
    <style>
        body {
            background-color: #000000; /* Глубокий черный */
            color: #555555; /* Тусклый серый текст */
            font-family: 'serif';
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 30px;
        }

        .content {
            max-width: 500px;
            text-align: center;
        }

        #text {
            line-height: 2;
            font-size: 1.2rem;
            font-style: italic;
            letter-spacing: 1px;
            white-space: pre-wrap;
        }

        /* Эффект затухания для всего контейнера */
        .fade-in {
            animation: fadeIn 5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .cursor {
            display: inline-block;
            width: 6px;
            height: 1.2rem;
            background: #333;
            margin-left: 4px;
            animation: blink 1.2s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Еле заметная точка внизу */
        .dot {
            margin-top: 50px;
            color: #1a1a1a;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="content fade-in">
        <div id="text"></div><span class="cursor"></span>
        <div class="dot">.</div>
    </div>

    <script>
        const story = `Мне 17.
        
Вокруг все чего-то ждут, а я просто не хочу чувствовать эту пустоту. 

Больно, когда люди называют тебя «дауном». Еще больнее, когда ты начинаешь верить им и сам ведешь себя так, будто ты сломан. Я не плохой, я просто не знаю, как починить себя в мире, который только и делает, что осуждает. 

Я устал казаться странным. Я просто хочу, чтобы меня услышали, а не высмеяли. 

Но в ответ только тишина.`;

        const textElement = document.getElementById('text');
        let index = 0;

        function typeWriter() {
            if (index < story.length) {
                textElement.innerHTML += story.charAt(index);
                index++;
                // Медленная, "тяжелая" печать
                setTimeout(typeWriter, 70); 
            }
        }

        window.onload = typeWriter;
    </script>

</body>
</html>
