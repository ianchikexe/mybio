<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сайт закрыт</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #444; /* Темно-серый цвет, чтобы не бросалось в глаза */
            font-family: sans-serif;
        }

        .status {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="status">Сайт закрыт</div>
    
    <div class="footer">янчик пук</div>

</body>
</html>
