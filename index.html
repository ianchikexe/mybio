<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>17 — маленький город</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #030405;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Roboto Mono', 'Courier New', monospace;
            padding: 1.5rem;
            position: relative;
        }

        /* Глубокий фон с едва заметными пятнами */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 15% 30%, rgba(40, 35, 45, 0.2) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        /* Центральная карточка — строгая, с характером */
        .center-piece {
            max-width: 780px;
            width: 100%;
            background: #0b0b0e;
            border: 1px solid #28222b;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.02);
            padding: 2.8rem 2.2rem;
            position: relative;
            z-index: 2;
            transition: transform 0.2s ease, box-shadow 0.3s;
            text-align: center; /* всё по центру */
        }

        /* лёгкая "тяжесть" при наведении */
        .center-piece:hover {
            transform: translateY(-2px);
            box-shadow: 0 28px 44px -14px black;
        }

        /* область текста */
        .text-area {
            text-align: left; /* сам текст выровнен влево для читаемости, но блок центрирован */
            margin: 0 auto;
            max-width: 90%;
        }

        #dynamic-text {
            font-size: 1.22rem;
            line-height: 1.7;
            font-weight: 450;
            color: #e0d6db;
            font-family: 'Courier New', 'Fira Code', monospace;
            letter-spacing: 0.01em;
            white-space: pre-wrap;
            word-break: break-word;
            text-shadow: 0 1px 1px rgba(0,0,0,0.5);
        }

        /* Полоска-разделитель грубая */
        .scar-divider {
            width: 70px;
            height: 2px;
            background: #4f3943;
            margin: 24px auto 18px auto;
            border-radius: 2px;
        }

        /* курсор печатной машинки */
        .cursor-block {
            display: inline-block;
            width: 8px;
            height: 1.5rem;
            background: #b38797;
            margin-left: 3px;
            animation: harshBlink 0.9s step-end infinite;
            vertical-align: middle;
            box-shadow: 0 0 2px #d69db3;
        }

        @keyframes harshBlink {
            0%, 100% { background: #b38797; opacity: 1; }
            50% { background: #2a1e23; opacity: 0.4; }
        }

        /* дополнительная цитата / подпись */
        .silent-signature {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #635a63;
            font-family: monospace;
            letter-spacing: 1px;
            border-top: 1px dashed #2e262b;
            padding-top: 1.2rem;
            display: inline-block;
            width: auto;
            transition: opacity 0.8s;
            opacity: 0;
        }

        .silent-signature.reveal {
            opacity: 0.7;
        }

        /* небольшой грязный эффект */
        .grain {
            position: absolute;
            bottom: 12px;
            left: 20px;
            font-size: 11px;
            color: #2e2429;
            user-select: none;
            font-weight: bold;
        }

        @media (max-width: 550px) {
            .center-piece {
                padding: 1.6rem;
            }
            #dynamic-text {
                font-size: 1rem;
                line-height: 1.55;
            }
            .cursor-block {
                height: 1.2rem;
            }
        }

        /* Эффект "рваной" кромки */
        .center-piece::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(145deg, rgba(90,70,80,0.2) 0%, transparent 80%);
            border-radius: 30px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

<div class="center-piece">
    <div class="text-area">
        <div id="dynamic-text"></div><span class="cursor-block" id="typeCursor"></span>
    </div>
    <div class="scar-divider"></div>
    <div class="silent-signature" id="signatureLine">
        // никто не услышит, но я всё равно здесь
    </div>
    <div class="grain">[ 17° ]</div>
</div>

<script>
    // НОВЫЙ ТЕКСТ — начало строго "Мне 17 лет. Живу в маленьком городе..." 
    // дальше по моему вкусу: искренне, грубовато, с надрывом, но без пошлости.
    const storyStart = `Мне 17 лет. Живу в маленьком городе.

Здесь все друг друга знают. И каждый считает своим долгом сказать, какой ты странный. Какой "не такой". Тебя называют дауном, шизом, просто потому что ты молчишь и не лезешь в их тусовки. 

Я не дурак. Я просто устал притворяться, что мне не всё равно.

Город маленький — надежд ещё меньше. После школы идёшь по серым панелькам, смотришь на заборы и понимаешь: отсюда не выбраться. По крайней мере — пока. Все ждут какого-то чуда. А я жду, когда перестанет болеть внутри.

Самое больное — когда начинаешь верить этим словам. "Даун". "Тормоз". Со временем они въедаются в голову, и ты сам ведёшь себя как сломанная кукла. 

Я хочу, чтобы меня просто услышали. Без издёвок. Без жалости. Но в ответ — стена. Тишина. Иногда мне кажется, что в этом городе у всех вместо сердец — куски асфальта.

Но знаешь что? Я ещё здесь. И это, блять, уже победа. 

Пусть никто не поймёт. Пусть останусь чужим. Но я не сдохну от того, что они обо мне думают.

Мне 17. Маленький город. Большая злость. И капля надежды, которую никто не украдёт.`;

    const textElement = document.getElementById('dynamic-text');
    const cursor = document.getElementById('typeCursor');
    const signature = document.getElementById('signatureLine');

    let i = 0;
    let isComplete = false;

    function typeSentence() {
        if (i < storyStart.length) {
            textElement.innerHTML += storyStart.charAt(i);
            i++;
            setTimeout(typeSentence, 45); // комфортная скорость чтения
        } else {
            // печать закончена
            isComplete = true;
            if (cursor) {
                cursor.style.opacity = '0';
                cursor.style.transition = 'opacity 0.4s';
            }
            // плавно показываем подпись внизу
            setTimeout(() => {
                signature.classList.add('reveal');
            }, 500);
        }
    }

    // Задержка для атмосферы
    setTimeout(() => {
        typeSentence();
    }, 200);

    // Ненавязчивый клик-эффект (лёгкая рябь)
    const card = document.querySelector('.center-piece');
    card.addEventListener('click', (e) => {
        const ripple = document.createElement('span');
        ripple.style.position = 'absolute';
        ripple.style.borderRadius = '50%';
        ripple.style.backgroundColor = 'rgba(150, 110, 130, 0.15)';
        ripple.style.width = '30px';
        ripple.style.height = '30px';
        ripple.style.left = `${e.clientX - card.getBoundingClientRect().left}px`;
        ripple.style.top = `${e.clientY - card.getBoundingClientRect().top}px`;
        ripple.style.transform = 'scale(0)';
        ripple.style.transition = 'transform 0.5s ease-out, opacity 0.6s';
        ripple.style.pointerEvents = 'none';
        card.style.overflow = 'hidden';
        card.appendChild(ripple);
        setTimeout(() => {
            ripple.style.transform = 'scale(8)';
            ripple.style.opacity = '0';
        }, 10);
        setTimeout(() => ripple.remove(), 500);
    });
</script>
</body>
</html>
