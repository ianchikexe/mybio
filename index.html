<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>17 — тишина внутри</title>
    <!-- Современный шрифт с элегантными засечками -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 30% 10%, #0a0a0a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Эффект зернистости (кинематографичный шум) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,0.01) 0px, rgba(0,0,0,0.02) 2px, transparent 3px);
            pointer-events: none;
            z-index: 1;
        }

        /* Тонкие движущиеся блики свечения */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 40% 60%, rgba(80, 70, 100, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .glass-panel {
            max-width: 680px;
            width: 100%;
            background: rgba(8, 8, 12, 0.65);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid rgba(120, 100, 130, 0.2);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            padding: 2.5rem 2rem;
            transition: all 0.3s ease;
            animation: fadeScale 2s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        @keyframes fadeScale {
            0% {
                opacity: 0;
                transform: scale(0.96);
                backdrop-filter: blur(0px);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                backdrop-filter: blur(10px);
            }
        }

        .text-container {
            position: relative;
            margin-bottom: 1rem;
        }

        #text {
            font-size: 1.45rem;
            line-height: 1.65;
            font-weight: 450;
            letter-spacing: 0.02em;
            color: #e2dfe7;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4), 0 0 8px rgba(80, 70, 120, 0.2);
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
            font-style: normal;
        }

        /* Стиль для цитат и особых акцентов */
        .silent-quote {
            margin-top: 2rem;
            border-top: 1px solid rgba(150, 130, 170, 0.25);
            padding-top: 1.2rem;
            font-size: 1rem;
            color: #9a8eae;
            letter-spacing: 0.5px;
            font-style: italic;
            transition: opacity 1.2s ease;
            opacity: 0;
            text-align: right;
        }

        .silent-quote.visible {
            opacity: 1;
        }

        /* Кастомный курсор в стиле старой пишущей машинки */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.65rem;
            background: #b9aed3;
            margin-left: 3px;
            animation: blinkSoft 1s infinite;
            vertical-align: middle;
            box-shadow: 0 0 3px #b9aed3;
        }

        @keyframes blinkSoft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* Тонкая линия – визуальный якорь */
        .under-mist {
            margin-top: 2.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            opacity: 0.5;
        }

        .under-mist hr {
            flex: 1;
            height: 1px;
            border: none;
            background: linear-gradient(90deg, transparent, #5f537b, #3f364f, #5f537b, transparent);
        }

        .age-sigil {
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #51496b;
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            font-family: monospace;
        }

        /* эффект плавного появления для доп. текста */
        .extra-verse {
            margin-top: 1.8rem;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #8b7fa3;
            text-align: center;
            border-left: 2px solid rgba(130, 110, 170, 0.4);
            padding-left: 1rem;
            font-style: italic;
            transition: all 0.5s;
            opacity: 0;
            transform: translateY(8px);
        }

        .extra-verse.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        /* Мобильная адаптация */
        @media (max-width: 550px) {
            .glass-panel {
                padding: 1.75rem 1.3rem;
            }
            #text {
                font-size: 1.15rem;
                line-height: 1.55;
            }
            .cursor {
                height: 1.4rem;
            }
        }

        /* Для поддержки темной темы и читаемости */
        ::selection {
            background: #4a3f6e;
            color: #f0ebff;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="text-container">
        <div id="text"></div><span class="cursor" id="cursor"></span>
    </div>

    <!-- Дополнительный блок, который появится после основного текста -->
    <div class="extra-verse" id="extraVerse">
        «Иногда тишина — это не пустота, а самый честный разговор.<br>
        Я здесь. Я слышу тебя.»
    </div>

    <div class="silent-quote" id="silentQuote">
        — апрель, семнадцать
    </div>

    <div class="under-mist">
        <hr>
        <div class="age-sigil">✦ 17 ✦</div>
        <hr>
    </div>
</div>

<script>
    // Оригинальный монолог — усилен дополнительными строками в конце для наполнения (сохраняя атмосферу)
    const coreStory = `Мне 17.
        
Вокруг все чего-то ждут, а я просто не хочу чувствовать эту пустоту. 

Больно, когда люди называют тебя «дауном». Еще больнее, когда ты начинаешь верить им и сам ведешь себя так, будто ты сломан. Я не плохой, я просто не знаю, как починить себя в мире, который только и делает, что осуждает. 

Я устал казаться странным. Я просто хочу, чтобы меня услышали, а не высмеяли. 

Но в ответ только тишина.`;

    // Добавим дополнительный завершающий фрагмент, который сделает текст полнее и мягче, 
    // он будет напечатан как часть основного монолога (но с короткой паузой после последней точки? 
    // лучше интегрировать как естественное продолжение размышления)
    // Чтобы сохранить целостность, но дать «больше текста», как просили, я добавлю ещё несколько строк,
    // которые органично ложатся в настроение "17" и не разрушают искренность.
    const extraLines = `\n\nМожет, никто никогда не прочитает этого. Но я всё равно пишу. Потому что даже если слова тонут в тишине — значит, я существую. И этого достаточно.`;

    const fullStory = coreStory + extraLines;

    const textElement = document.getElementById('text');
    const cursorSpan = document.getElementById('cursor');
    const silentQuote = document.getElementById('silentQuote');
    const extraVerseDiv = document.getElementById('extraVerse');

    let index = 0;
    let isTypingFinished = false;

    // Функция печати с эффектом "задумчивой" скорости (чуть медленнее, чтобы проникнуться)
    function typeWriter() {
        if (index < fullStory.length) {
            // Добавляем символ за символом с сохранением переносов
            textElement.innerHTML += fullStory.charAt(index);
            index++;
            // Скорость 55мс — ощущение живого размышления, не слишком быстро
            setTimeout(typeWriter, 50);
        } else {
            // Печать закончена — убираем курсор с задержкой, чтобы не мешал
            if (cursorSpan) {
                setTimeout(() => {
                    cursorSpan.style.opacity = '0';
                    cursorSpan.style.transition = 'opacity 0.8s ease';
                }, 1200);
            }
            isTypingFinished = true;
            
            // После полной печати плавно показываем дополнительные декоративные элементы
            setTimeout(() => {
                silentQuote.classList.add('visible');
            }, 400);
            
            // Показываем "extra verse" с красивым появлением
            setTimeout(() => {
                extraVerseDiv.classList.add('reveal');
            }, 900);
        }
    }

    // Адаптация: небольшая задержка перед стартом для атмосферы (будто дыхание)
    setTimeout(() => {
        typeWriter();
    }, 200);

    // Эффект дополнительной «тяжести»: при клике на текст ничего не меняется,
    // но появляется тонкая подсказка (не навязчиво)
    document.querySelector('.glass-panel').addEventListener('click', (e) => {
        // Если вдруг пользователь кликнет — создаст лёгкое свечение? не обязательно, но добавим мягкий тактильный отклик
        const ripple = document.createElement('span');
        ripple.style.position = 'absolute';
        ripple.style.borderRadius = '50%';
        ripple.style.backgroundColor = 'rgba(180, 160, 210, 0.1)';
        ripple.style.width = '40px';
        ripple.style.height = '40px';
        ripple.style.left = `${e.clientX - e.target.closest('.glass-panel').getBoundingClientRect().left}px`;
        ripple.style.top = `${e.clientY - e.target.closest('.glass-panel').getBoundingClientRect().top}px`;
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'scale(0)';
        ripple.style.transition = 'transform 0.5s ease-out, opacity 0.6s';
        ripple.style.opacity = '0.8';
        document.querySelector('.glass-panel').appendChild(ripple);
        
        setTimeout(() => {
            ripple.style.transform = 'scale(5)';
            ripple.style.opacity = '0';
        }, 10);
        setTimeout(() => {
            ripple.remove();
        }, 600);
    });

    // Для поддержки тонкого фона и эффекта мерцания звезд (CSS-частицы через псевдоэлементы уже есть)
    // Добавим динамический ресайз для корректного отображения курсора
    window.addEventListener('resize', () => {
        // просто placeholder — сохраняем стабильность
    })
</script>
</body>
</html>
